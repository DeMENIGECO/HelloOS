<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HelloOS Downloads</title>
<style>
  body{
    font-family:sans-serif;
    background:#1e1e2f;
    color:white;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  header{
    background:#111;
    width:100%;
    padding:20px 0;
    text-align:center;
    font-size:2rem;
    font-weight:bold;
  }

  main{
    padding:40px 20px;
    max-width:600px;
    width:100%;
  }

  .version{
    background:#333;
    margin:10px 0;
    padding:20px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .version button{
    background:#1e90ff;
    border:none;
    color:white;
    padding:10px 20px;
    border-radius:6px;
    cursor:pointer;
    font-size:1rem;
  }

  .version button:hover{
    background:#1c7ed6;
  }

  footer{
    margin-top:auto;
    padding:20px;
    text-align:center;
    background:#111;
  }

  a{
    color:#1e90ff;
    text-decoration:none;
  }
</style>
</head>
<body>

<header>HelloOS Downloads</header>

<main>
  <div class="version">
    <span>Versione 1.0</span>
    <button onclick="window.location.href='vers/1.0/HelloOS-1.0.zip'">Scarica</button>
  </div>
</main>

<footer>


</body>
</html>
